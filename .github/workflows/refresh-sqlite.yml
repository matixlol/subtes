name: Refresh SQLite

on:
  schedule:
    - cron: "0 13 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-sqlite:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Git LFS
        run: git lfs install

      - name: Download latest SQLite file
        run: |
          curl -fL \
            "https://raw.githubusercontent.com/j-e-d/accesibilidad-subte/main/accesibilidad.sqlite" \
            -o data/accesibilidad.sqlite

      - name: Commit and push when changed
        run: |
          if git diff --quiet -- data/accesibilidad.sqlite; then
            echo "No SQLite changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/accesibilidad.sqlite
          git commit -m "chore(data): refresh accesibilidad sqlite"
          git push
